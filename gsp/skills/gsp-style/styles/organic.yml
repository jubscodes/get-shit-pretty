name: organic
description: Natural flowing forms — wabi-sabi imperfection, moss greens, terracotta, blob shapes
tags: [natural, flowing, organic, wabi-sabi, curved]

tokens:
  color:
    primary: "#5D7052"
    secondary: "#C18C5D"
    accent: "#E6DCCD"
    background: "#FDFCF8"
    surface: "#F0EBE5"
    on-primary: "#FFFFFF"
    on-background: "#2C2C24"
    error: "#DC2626"
    success: "#059669"
    warning: "#D97706"
    info: "#2563EB"
    muted: "#6B7280"

  typography:
    font-family-primary: "Fraunces, serif"
    font-family-secondary: "Nunito, sans-serif"
    font-family-mono: "JetBrains Mono, monospace"
    font-weight-heading: 600
    font-weight-body: 400
    font-size-base: "16px"
    line-height-base: 1.7

  shape:
    border-radius-sm: "12px"
    border-radius-md: "24px"
    border-radius-lg: "9999px"
    border-width: "1px"
    border-color: "rgba(93,112,82,0.15)"

  blob:
    border-radius: "60% 40% 30% 70% / 60% 30% 70% 40%"

  elevation:
    shadow-sm: "0 4px 20px -2px rgba(93,112,82,0.15)"
    shadow-md: "0 8px 30px -4px rgba(93,112,82,0.18)"
    shadow-lg: "0 10px 40px -10px rgba(193,140,93,0.2)"
    shadow-xl: "0 16px 50px -12px rgba(93,112,82,0.25)"

  spacing:
    base: 8
    scale: [4, 8, 12, 16, 24, 32, 48, 64, 96]

  motion:
    duration-fast: "200ms"
    duration-normal: "400ms"
    easing: "ease-out"

  texture:
    grain-opacity: 0.035
    blend-mode: "multiply"

dark_mode:
  color:
    background: "#1E1E18"
    surface: "#2C2C24"
    on-background: "#E6DCCD"

compatibility: [botanical, sketch]
clashes: [cyberpunk, terminal, industrial]
