name: claymorphism
description: Soft clay 3D — 4-layer shadow stacks, super-rounded, candy colors, squish interactions
tags: [clay, 3d, soft, playful, tactile]
trend_ref: trends/claymorphism.md

tokens:
  color:
    primary: "#7C3AED"
    secondary: "#EC4899"
    accent: "#0EA5E9"
    background: "#F4F1FA"
    surface: "rgba(255,255,255,0.60)"
    on-primary: "#FFFFFF"
    on-background: "#332F3A"
    error: "#EF4444"
    success: "#22C55E"
    warning: "#F59E0B"
    info: "#0EA5E9"
    muted: "#635F69"

  typography:
    font-family-primary: "Nunito, sans-serif"
    font-family-secondary: "DM Sans, sans-serif"
    font-family-mono: "JetBrains Mono, monospace"
    font-weight-heading: 800
    font-weight-body: 400
    font-size-base: "16px"
    line-height-base: 1.5

  shape:
    border-radius-sm: "20px"
    border-radius-md: "32px"
    border-radius-lg: "48px"
    border-width: "0px"
    border-color: "transparent"

  inset:
    pressed: "inset 10px 10px 20px #d9d4e3, inset -10px -10px 20px #fff"

  glass:
    surface-opacity: 0.6
    backdrop-blur: "20px"

  gradient:
    button: "linear-gradient(to bottom right, #A78BFA, #7C3AED)"

  elevation:
    shadow-sm: "8px 8px 16px rgba(139,92,246,0.15), -8px -8px 16px rgba(255,255,255,0.4), inset 2px 2px 4px rgba(255,255,255,0.4), inset -2px -2px 4px rgba(0,0,0,0.05)"
    shadow-md: "12px 12px 24px rgba(139,92,246,0.3), -8px -8px 16px rgba(255,255,255,0.4), inset 4px 4px 8px rgba(255,255,255,0.4), inset -4px -4px 8px rgba(0,0,0,0.1)"
    shadow-lg: "20px 20px 40px rgba(139,92,246,0.3), -20px -20px 40px rgba(255,255,255,0.5), inset 6px 6px 12px rgba(255,255,255,0.4), inset -6px -6px 12px rgba(0,0,0,0.1)"
    shadow-xl: "30px 30px 60px #cdc6d9, -30px -30px 60px #fff, inset 10px 10px 20px rgba(139,92,246,0.05), inset -10px -10px 20px rgba(255,255,255,0.8)"

  spacing:
    base: 8
    scale: [4, 8, 12, 16, 24, 32, 48, 64, 96]

  motion:
    duration-fast: "200ms"
    duration-normal: "300ms"
    easing: "cubic-bezier(0.4, 0, 0.2, 1)"

dark_mode:
  color:
    background: "#1E1B2E"
    surface: "rgba(50,45,70,0.60)"
    on-background: "#E8E6F0"

compatibility: [neumorphism, playful-geometric]
clashes: [neubrutalism, monochrome, terminal]
