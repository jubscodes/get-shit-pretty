name: material
description: Material Design 3 — adaptive color, organic shapes, expressive motion, state layers
tags: [material, google, android, rounded, colorful]

tokens:
  color:
    primary: "#6750A4"
    secondary: "#625B71"
    accent: "#BB86FC"
    background: "#FFFBFE"
    surface: "#F3EDF7"
    on-primary: "#FFFFFF"
    on-background: "#1C1B1F"
    error: "#B3261E"
    success: "#16A34A"
    warning: "#F59E0B"
    info: "#3B82F6"
    muted: "#79747E"

  typography:
    font-family-primary: "Roboto, system-ui, sans-serif"
    font-family-mono: "Roboto Mono, monospace"
    font-weight-heading: 500
    font-weight-body: 400
    font-size-base: "16px"
    line-height-base: 1.5

  shape:
    border-radius-sm: "8px"
    border-radius-md: "12px"
    border-radius-lg: "16px"
    border-radius-xl: "28px"
    border-width: "1px"
    border-color: "#79747E"

  elevation:
    shadow-sm: "0 1px 2px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.15)"
    shadow-md: "0 1px 2px rgba(0,0,0,0.3), 0 2px 6px rgba(0,0,0,0.15)"
    shadow-lg: "0 4px 8px rgba(0,0,0,0.3), 0 6px 12px rgba(0,0,0,0.15)"
    shadow-xl: "0 8px 12px rgba(0,0,0,0.3), 0 12px 24px rgba(0,0,0,0.15)"

  spacing:
    base: 8
    scale: [0, 8, 16, 24, 32, 40, 48, 56, 64, 72, 80, 96]

  motion:
    duration-fast: "200ms"
    duration-normal: "300ms"
    easing: "cubic-bezier(0.2, 0, 0, 1)"

dark_mode:
  color:
    background: "#1C1B1F"
    surface: "#2B2930"
    on-background: "#E6E1E5"

compatibility: [professional, fluent]
clashes: [neubrutalism, monochrome, retro]
