name: Harness Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit-tests:
    name: Audit suite (65 tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
      - name: Run audit suite
        run: bash dev/scripts/audit-tests.sh

  zero-prod-deps:
    name: Zero production dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
      - name: Check
        run: bash dev/scripts/check-zero-prod-deps.sh

  build-smoke:
    name: Next.js build smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'
          cache: 'npm'
      # Use npm install (not npm ci): lockfile is generated on macOS arm64 and
      # lacks some Linux wasm-fallback @emnapi entries that npm ci requires.
      # Build smoke just verifies buildability, not strict reproducibility.
      - run: npm install --no-audit --no-fund
      - run: npm run build

  shellcheck:
    name: Shellcheck guard scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      # Scope: user-facing guard scripts only (scripts/*.sh). These ship with
      # the npm package and run on every Edit/Write — typos silently disable
      # enforcement. dev/scripts/*.sh is excluded because it's developer
      # tooling with accumulated lint debt; cleanup is tracked separately.
      - name: Lint scripts/*.sh
        run: |
          shopt -s nullglob
          set -e
          shellcheck -x scripts/*.sh
